_schema: unified-v1
network:
  plugin: ns3
  type: ns3
  simulation_script: remote_robot_control-default
  profile: 5g_nr_urllc
  numerology: 3
  bandwidth: 100e6
  scheduler: urllc
  nodes:
    - name: pendulum_robot
      type: UE
      ip: 7.0.0.2
    - name: pendulum_controller
      type: UE
      ip: 7.0.0.3
    - name: gnb1
      type: GNB
      ip: 7.0.0.1
robot:
  plugin: gazebo
  world: worlds/empty.world
  robots:
    - name: pendulum
      model:
        type: urdf
        path: models/pendulum.urdf
      pose:
        x: 0.0
        y: 0.0
        z: 0.0
experiment:
  name: pendulum_nr_control
  duration: 60.0
  output_dir: tasks/pendulum_nr_control/results
  primary_metric: mean_aoi_ms
  higher_is_better: false
