_schema: unified-v1
network:
  plugin: ns3
  type: ns3
  simulation_script: remote_robot_control-default   # NS-3 scratch script (exact-match: remote_robot_control-default.cc)
  networkPreset: 5g_nr_urllc                # --networkPreset CLI arg
  numerology: 3                              # --numerology CLI arg
  bandwidth: 100000000                       # --bandwidth in Hz (100 MHz)
  schedulerType: edf                         # --schedulerType: edf for URLLC
  nodes:
    - name: pendulum_robot
      type: UE
      ip: 7.0.0.2
    - name: pendulum_controller
      type: UE
      ip: 7.0.0.3
    - name: gnb1
      type: GNB
      ip: 7.0.0.1
robot:
  plugin: gazebo
  world: worlds/empty.world
  robots:
    - name: pendulum
      model:
        type: urdf
        path: models/pendulum.urdf
      pose:
        x: 0.0
        y: 0.0
        z: 0.0
experiment:
  name: pendulum_nr_control
  duration: 60.0
  output_dir: tasks/pendulum_nr_control/results
  primary_metric: mean_aoi_ms
  higher_is_better: false
